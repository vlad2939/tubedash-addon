<!DOCTYPE html>
<html lang="ro" class="dark">
<head>
    <meta charset="utf-8">
    <title>MyTube Dash</title>
    <!-- Fără tag-uri dinamice. Fără <base>. Doar legături relative. -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Design ultra-profesionist Dark Mode (tip MacOS/Glassmorphism)
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { 
                    colors: { 
                        zinc: { 900: '#18181b', 800: '#27272a', 700: '#3f3f46'},
                        surface: '#09090b', // Negru extrem de ușor spălat pentru panouri
                        dash: '#000000'     // Negru absolut pentru adâncime (fundal spate)
                    },
                    fontFamily: {
                        sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        blob: "blob 10s infinite alternate",
                        'slide-up': "slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        'pulse-slow': "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        },
                        slideUp: {
                            "0%": { opacity: 0, transform: "translateY(20px)" },
                            "100%": { opacity: 1, transform: "translateY(0)" }
                        }
                    }
                }
            }
        };

        // Asigurăm tema setată la redare rapidă
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-zinc-100 dark:bg-[#0a0604] text-zinc-900 dark:text-zinc-100 flex h-screen overflow-hidden antialiased selection:bg-orange-500/30 selection:text-black dark:selection:text-white transition-colors duration-500 relative">
    
    <!-- Animated background layers -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-yellow-400/30 dark:bg-yellow-500/20 blur-[100px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-amber-400/30 dark:bg-amber-500/20 blur-[120px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000" style="animation-delay: 2s;"></div>
        <div class="absolute bottom-[-20%] left-[10%] w-[40%] h-[40%] rounded-full bg-orange-400/30 dark:bg-orange-500/20 blur-[100px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000" style="animation-delay: 4s;"></div>
    </div>

    <!-- Wrapper cu spatiere si grid pt sticla -->
    <div class="relative z-10 flex h-screen p-4 lg:p-6 gap-6 w-full max-w-[1800px] mx-auto overflow-hidden">
        
        <!-- Overlay pentru mobil mutat în interiorul z-10 context -->
        <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-md z-30 hidden opacity-0 transition-opacity duration-300 lg:hidden"></div>

        <!-- Meniu Lateral (Sidebar) plutitor -->
        <aside id="sidebar" class="w-[280px] bg-white/70 dark:bg-black/40 backdrop-blur-2xl border border-white/50 dark:border-white/10 rounded-3xl flex flex-col shrink-0 shadow-[0_8px_32px_rgba(0,0,0,0.05)] dark:shadow-[0_8px_32px_rgba(0,0,0,0.3)] z-40 absolute lg:relative h-[calc(100%-2rem)] lg:h-full transition-transform duration-300 -translate-x-[110%] lg:translate-x-0 overflow-hidden">
            <div class="h-20 flex items-center px-6 border-b border-zinc-200/50 dark:border-white/5 transition-colors duration-300 backdrop-blur-md">
                <div class="flex items-center gap-3 font-bold text-[18px] tracking-tight text-zinc-900 dark:text-white cursor-default">
                    <div class="w-8 h-8 rounded-xl bg-zinc-900 dark:bg-white flex items-center justify-center shadow-lg shadow-orange-500/20 transition-all duration-300 hover:scale-105 hover:rotate-3">
                        <span class="material-icons md-18 text-white dark:text-black translate-x-[1px]">play_arrow</span>
                    </div>
                    MyTube Dash
                </div>
                <!-- Buton inchidere pe mobile -->
                <button onclick="toggleSidebar()" class="lg:hidden ml-auto text-zinc-400 hover:text-zinc-900 dark:hover:text-white bg-black/5 dark:bg-white/5 p-2 rounded-full backdrop-blur-md">
                    <span class="material-icons text-[18px]">close</span>
                </button>
            </div>
            
            <div class="px-5 pt-6 pb-4">
                <div class="flex items-center justify-between mb-5 px-1">
                    <span class="text-[10px] font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest select-none">Temă</span>
                    <button onclick="toggleTheme()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-zinc-200 dark:bg-white/10 transition-colors focus:outline-none hover:ring-2 hover:ring-orange-500/50">
                        <span class="theme-knob inline-block h-4 w-4 transform rounded-full bg-white dark:bg-zinc-300 transition-transform translate-x-1 dark:translate-x-6 shadow-sm"></span>
                    </button>
                </div>
                <div class="relative group">
                    <span class="material-icons absolute left-4 top-1/2 -translate-y-[45%] text-zinc-400 dark:text-zinc-500 text-[18px] group-focus-within:text-orange-600 dark:group-focus-within:text-orange-500 transition-colors">search</span>
                    <input type="text" id="global-search" oninput="handleGlobalSearch(this.value)" placeholder="Caută ceva..." spellcheck="false" autocomplete="off" class="w-full bg-white/50 dark:bg-white/5 border border-zinc-200 dark:border-white/10 rounded-2xl pl-11 pr-4 py-3.5 text-zinc-900 dark:text-white placeholder-zinc-500 dark:placeholder-zinc-500 focus:bg-white dark:focus:bg-white/10 focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition-all text-[14px] outline-none shadow-sm dark:shadow-none backdrop-blur-sm">
                </div>
            </div>
            
            <div id="sidebar-playlists" class="flex-1 overflow-y-auto px-4 space-y-1.5 custom-scrollbar pb-6 relative z-10">
                <!-- Playlist-urile vor fi generate de app.js aici -->
            </div>

            <div class="px-4 pb-5 pt-5 border-t border-zinc-200/50 dark:border-white/5 bg-white/30 dark:bg-black/20 backdrop-blur-md transition-colors duration-300">
                <button onclick="openReadmePopup()" class="w-full flex items-center justify-center px-4 py-3 hover:bg-white dark:hover:bg-white/10 rounded-2xl text-center transition-all text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white text-xs font-semibold tracking-wide select-none shadow-sm dark:shadow-none hover:shadow-md border border-transparent hover:border-zinc-200 dark:hover:border-white/10 focus:outline-none focus:ring-2 focus:ring-orange-500/50 group">
                    <span class="material-icons text-[16px] mr-2 opacity-50 group-hover:opacity-100 group-hover:text-orange-500 transition-all">info_outline</span>
                    Despre aplicație
                </button>
            </div>
        </aside>

        <!-- Zona Principală de Video -->
        <main id="app-content" class="flex-1 flex flex-col bg-white/70 dark:bg-black/40 backdrop-blur-2xl border border-white/50 dark:border-white/10 rounded-3xl overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.05)] dark:shadow-[0_8px_32px_rgba(0,0,0,0.3)] relative transition-all duration-300">
            <!-- Mobile Header (Visible only on small screens) -->
            <div class="lg:hidden w-full flex items-center justify-between px-6 py-4 bg-white/40 dark:bg-black/40 backdrop-blur-xl border-b border-zinc-200/50 dark:border-white/5 sticky top-0 z-20">
                <div class="flex items-center gap-2.5 font-bold text-[16px] tracking-tight text-zinc-900 dark:text-white">
                    <div class="w-8 h-8 rounded-xl bg-zinc-900 dark:bg-white flex items-center justify-center shadow-lg shadow-orange-500/20">
                        <span class="material-icons text-white dark:text-black md-18 translate-x-[1px]">play_arrow</span>
                    </div>
                    MyTube Dash
                </div>
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white/50 dark:bg-white/5 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-all border border-zinc-200/50 dark:border-white/10 shadow-sm backdrop-blur-sm focus:outline-none focus:ring-2 focus:ring-orange-500/50">
                    <span class="material-icons">menu</span>
                </button>
            </div>

            <!-- Conținut JS -->
            <div id="app-container" class="w-full flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative z-10 animate-slide-up"></div>
        </main>
    </div>

    <!-- Modal pentru README -->
    <div id="readme-modal" class="fixed inset-0 bg-zinc-900/60 dark:bg-black/80 backdrop-blur-xl hidden z-50 flex items-center justify-center p-4 lg:p-10 transition-all duration-300" onclick="closeReadmePopup()">
        <div class="bg-white/90 dark:bg-[#111115]/90 backdrop-blur-2xl border border-white/50 dark:border-white/10 rounded-[2rem] w-full max-w-4xl max-h-[90vh] flex flex-col shadow-[0_32px_64px_rgba(0,0,0,0.2)] dark:shadow-[0_32px_64px_rgba(0,0,0,0.6)] overflow-hidden transition-all duration-300 transform scale-95 opacity-0" id="readme-modal-inner" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-6 border-b border-zinc-200/50 dark:border-white/5 bg-white/50 dark:bg-white/[0.02]">
                <h3 class="font-bold text-base text-zinc-900 dark:text-zinc-100 flex items-center gap-3"><span class="material-icons text-orange-500 dark:text-orange-500">description</span> Documentație MyTube Dash</h3>
                <button onclick="closeReadmePopup()" class="w-10 h-10 flex items-center justify-center rounded-full text-zinc-500 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-200 dark:hover:bg-white/10 transition-all focus:outline-none focus:ring-2 focus:ring-orange-500/50"><span class="material-icons">close</span></button>
            </div>
            <div id="readme-content" class="p-8 lg:p-12 overflow-y-auto prose prose-base md:prose-lg prose-zinc dark:prose-invert max-w-none custom-scrollbar text-zinc-700 dark:text-zinc-300"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
